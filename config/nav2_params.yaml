local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: chassis/body
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.10
      robot_radius: 0.30
      always_send_full_costmap: true
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.0
        cost_scaling_factor: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: chassis/body
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.10
      track_unknown_space: false
      robot_radius: 0.30
      always_send_full_costmap: true
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.0
        cost_scaling_factor: 1.0


planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    costmap_update_timeout: 1.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true


waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: true
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: false
      waypoint_pause_duration: 0